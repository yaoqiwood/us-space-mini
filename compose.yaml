services:
  mysql:
    image: mysql:8.4
    container_name: couple-space-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: couple_space
      MYSQL_USER: couple_space
      MYSQL_PASSWORD: couple_space_dev_only
      MYSQL_ROOT_PASSWORD: root_dev_only
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev_only"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    container_name: couple-space-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: mysql+pymysql://couple_space:couple_space_dev_only@mysql:3306/couple_space
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  mysql_data:
