services:
  mysql:
    image: mysql:8.4
    container_name: couple-space-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: couple_space
      MYSQL_USER: couple_space
      MYSQL_PASSWORD: couple_space_dev_only
      MYSQL_ROOT_PASSWORD: root_dev_only
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev_only"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
